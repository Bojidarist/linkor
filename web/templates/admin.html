<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linkor Admin</title>
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
<div class="container" id="app">
    <header>
        <h1><span>Linkor</span> Admin</h1>
        <div class="stats-bar">
            <span>Links: <strong id="stat-links">0</strong></span>
            <span>Total Clicks: <strong id="stat-clicks">0</strong></span>
            <span>Unique Clicks: <strong id="stat-unique">0</strong></span>
        </div>
    </header>

    <div class="toolbar">
        <button class="btn btn-primary" id="btn-create">+ New Link</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Short URL</th>
                <th>Target URL</th>
                <th>Clicks</th>
                <th>Unique</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="links-tbody"></tbody>
    </table>
</div>

<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
        <h2 id="modal-title">Create Link</h2>
        <form id="link-form">
            <div class="form-group">
                <label for="field-name">Name</label>
                <input type="text" id="field-name" required placeholder="My awesome link">
            </div>
            <div class="form-group">
                <label for="field-short-url">Short URL</label>
                <input type="text" id="field-short-url" placeholder="custom-slug">
                <p class="hint">Leave empty to auto-generate. Letters, digits, hyphens, underscores only.</p>
            </div>
            <div class="form-group">
                <label for="field-target-url">Target URL</label>
                <input type="url" id="field-target-url" required placeholder="https://example.com">
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-ghost" id="btn-cancel">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="/static/js/admin.js"></script>
</body>
</html>
